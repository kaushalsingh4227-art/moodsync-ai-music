<!DOCTYPE html>
<html>
<head>
    <title>Login | MoodTune AI</title>
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>

<div class="container">

    <div class="left-panel">
        <h1>Welcome to MoodTune 🎵</h1>
        <p>Your AI Music Companion</p>
    </div>

    <div class="right-panel">

        <!-- Toggle Buttons -->
        <div class="toggle">
            <button onclick="showLogin()">Login</button>
            <button onclick="showSignup()">Signup</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="/login">
            <input type="email" name="email" placeholder="Email" required>
            
            <div class="password-box">
                <input type="password" id="loginPass" name="password" placeholder="Password" required>
                <span onclick="togglePass('loginPass')">👁️</span>
            </div>

            <label>
                <input type="checkbox" name="remember"> Remember Me
            </label>

            <button type="submit">Login</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" method="POST" action="/signup" style="display:none;">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>

            <div class="password-box">
                <input type="password" id="signupPass" name="password" placeholder="Password" required>
                <span onclick="togglePass('signupPass')">👁️</span>
            </div>

            <button type="submit">Create Account</button>
        </form>

    </div>
</div>

<script src="/static/auth.js"></script>
</body>
</html>
