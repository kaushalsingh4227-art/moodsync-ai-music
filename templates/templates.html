<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodSync AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#020d24;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding:30px;
}

.left-panel,.right-panel{
flex:1;
min-width:400px;
}

.camera-wrapper{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}

video,canvas{
width:100%;
border-radius:12px;
}

canvas{
position:absolute;
top:0;
left:0;
}

button{
padding:10px 15px;
margin-top:10px;
background:#00c853;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

.ai-box{
margin-top:30px;
background:#071a3c;
padding:15px;
border-radius:10px;
}

input{
width:65%;
padding:8px;
border-radius:6px;
border:none;
}

.ai-box button{
margin-left:5px;
}

#status{
margin-top:10px;
color:#00e5ff;
}

.logout{
display:block;
margin-top:20px;
color:#00e5ff;
}

.music-box{
margin-top:20px;
text-align:center;
}
</style>
</head>

<body>

<header>MoodSync AI Dashboard</header>

<div class="container">

<!-- LEFT PANEL -->
<div class="left-panel">

<h2>Welcome {{username}}</h2>

<div class="camera-wrapper">
<video id="video" autoplay muted></video>
<canvas id="canvas"></canvas>
</div>

<div id="status">Starting camera...</div>

<p id="emotionText">Emotion: -</p>
<p id="confidenceText">Confidence: -</p>

<div class="music-box">
<h3>🎵 Smart Music Player</h3>

<p id="musicStatus">Waiting for emotion...</p>

<div id="player"></div>

<div style="margin-top:10px;">
<button onclick="playVideo()">▶️</button>
<button onclick="pauseVideo()">⏸</button>
<button onclick="nextSong()">⏭</button>

<input type="range" min="0" max="100" value="50"
onchange="setVolume(this.value)">
</div>

<button onclick="openMusic()">Play Last Song</button>

</div>

</div>

<!-- RIGHT PANEL -->
<div class="right-panel">

<h3>Emotion History</h3>
<canvas id="emotionChart"></canvas>

<div class="ai-box">
<h3>AI Assistant</h3>

<input id="aiInput" placeholder="Ask something...">
<button onclick="askAI()">Ask</button>
<button onclick="startVoice()">🎤</button>

<p id="aiResponse"></p>
</div>

<a href="/logout" class="logout">Logout</a>

</div>

</div>

<script>

/* ================= YOUTUBE PLAYER ================= */
let player;
let currentMood = null;
let lastVideoUrl = null;

function onYouTubeIframeAPIReady(){
player = new YT.Player('player', {
height: '250',
width: '100%',
videoId: '',
playerVars: { autoplay: 1 },
events: {
'onReady': (event) => {
event.target.setVolume(50);
}
}
});
}

function loadVideo(videoUrl){
const videoId = videoUrl.split("v=")[1];
player.loadVideoById(videoId);
}

function playVideo(){
if(player) player.playVideo();
}

function pauseVideo(){
if(player) player.pauseVideo();
}

function setVolume(vol){
if(player) player.setVolume(vol);
}

/* ================= NEXT SONG ================= */
async function nextSong(){

if(!currentMood) return;

let res = await fetch("/get_song", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ mood: currentMood })
});

let data = await res.json();

loadVideo(data.video_url);
}

/* ================= CAMERA ================= */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
document.getElementById("status").innerText="Camera ON";
})
.catch(()=>{
document.getElementById("status").innerText="Camera access denied";
});

video.addEventListener("loadedmetadata",()=>{
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
});

/* ================= CHART ================= */
const chartCtx = document.getElementById("emotionChart").getContext("2d");

let emotionChart = new Chart(chartCtx,{
type:"line",
data:{labels:[],datasets:[{label:"Confidence %",data:[],borderColor:"#00e5ff",fill:false}]},
options:{scales:{y:{min:0,max:100}}}
});

function updateChart(conf){
let time = new Date().toLocaleTimeString();

emotionChart.data.labels.push(time);
emotionChart.data.datasets[0].data.push(conf);

if(emotionChart.data.labels.length>10){
emotionChart.data.labels.shift();
emotionChart.data.datasets[0].data.shift();
}

emotionChart.update();
}

/* ================= DETECTION ================= */
let lastEmotion = null;

async function detectEmotion(){

let tempCanvas = document.createElement("canvas");
tempCanvas.width = video.videoWidth;
tempCanvas.height = video.videoHeight;

tempCanvas.getContext("2d").drawImage(video,0,0);

tempCanvas.toBlob(async function(blob){

let formData = new FormData();
formData.append("frame", blob);

try{
let res = await fetch("/detect",{method:"POST", body:formData});
let data = await res.json();

ctx.clearRect(0,0,canvas.width,canvas.height);

if(data.box){
let [x,y,w,h] = data.box;
ctx.strokeStyle="lime";
ctx.strokeRect(x,y,w,h);
}

if(data.emotion && data.emotion !== "-"){

currentMood = data.emotion;
lastVideoUrl = data.video_url;

document.getElementById("emotionText").innerText = "Emotion: " + data.emotion;
document.getElementById("confidenceText").innerText = "Confidence: " + data.confidence + "%";

updateChart(data.confidence);

if(data.video_url && data.emotion !== lastEmotion){
lastEmotion = data.emotion;
document.getElementById("musicStatus").innerText = "Playing: " + data.emotion;

/* 🔥 PLAY INSIDE APP */
loadVideo(data.video_url);
}
}

}catch(err){
console.error(err);
document.getElementById("status").innerText="Error detecting";
}

});

}

setInterval(detectEmotion, 8000);

/* ================= MANUAL PLAY ================= */
function openMusic(){
if(lastVideoUrl){
loadVideo(lastVideoUrl);
}
}

/* ================= AI ================= */
async function askAI(){

let query = document.getElementById("aiInput").value;
if(!query) return;

let res = await fetch("/ask_ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query})
});

let data = await res.json();

document.getElementById("aiResponse").innerText = data.response;

/* 🔊 SPEAK RESPONSE */
speak(data.response);
}
/* ================= VOICE ================= */
function startVoice(){

const btn = event.target;
btn.classList.add("listening");

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang = "en-IN";
recognition.start();

recognition.onresult = function(e){

let text = e.results[0][0].transcript.toLowerCase();

document.getElementById("aiInput").value = text;

/* 🎯 COMMAND DETECTION */
if(text.includes("play")){
playVideo();
speak("Playing music");
return;
}

if(text.includes("pause")){
pauseVideo();
speak("Music paused");
return;
}

if(text.includes("next")){
nextSong();
speak("Playing next song");
return;
}

if(text.includes("volume")){
let num = text.match(/\d+/);
if(num){
setVolume(num[0]);
speak("Volume set to " + num[0]);
}
return;
}

/* 🤖 OTHERWISE SEND TO AI */
askAI();
};
}
function speak(text){

const speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-IN";
speech.rate = 1;

window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
